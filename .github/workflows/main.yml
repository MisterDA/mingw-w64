name: winpthreads
on: [push]

env:
  CYGWIN: winsymlinks:nativestrict
  MSYS: winsymlinks:nativestrict

jobs:
  msvc:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: ['x86_64', 'i686']
        cc: ['cl', 'clang-cl']

    steps:
      - name: Save pristine PATH
        run: |
          echo "PRISTINE_PATH=${env:Path}" >> "${env:GITHUB_ENV}"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          # This is cl version 19.38, Visual Studio version 17.8
          toolset: 14.38
          arch: ${{ matrix.arch == 'x86_64' && 'x64' || 'x86' }}

      - name: Restore Cygwin cache
        uses: actions/cache/restore@v3
        env:
          PATH: ${{ env.PRISTINE_PATH }}
        with:
          path: |
            C:\cygwin-packages
          key: cygwin-packages

      - name: Install Cygwin (Cygwin)
        uses: cygwin/cygwin-install-action@master
        with:
          packages: make

      - name: Save Cygwin cache
        uses: actions/cache/save@v3
        env:
          PATH: ${{ env.PRISTINE_PATH }}
        with:
          path: |
            C:\cygwin-packages
          key: cygwin-packages

      - uses: actions/checkout@v4
        with:
          path: mingw-w64
      - uses: actions/checkout@v4
        with:
          repository: metastack/msvs-tools
          path: msvs-tools

      - name: Build winpthreads
        shell: bash -eo pipefail {0}
        run: >-
          eval $(./msvs-tools/msvs-promote-path);
          cd mingw-w64/mingw-w64-libraries/winpthreads || exit;
          ./configure --host=${{ matrix.arch }}-pc-windows CC=${{ matrix.cc }}.exe;
          make
      - name: Test winpthreads
        shell: bash -eo pipefail {0}
        run: >-
          eval $(./msvs-tools/msvs-promote-path);
          cd mingw-w64/mingw-w64-libraries/winpthreads || exit;
          make check

  msys2-mingw:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        arch: ['x86_64', 'i686']
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.arch == 'x86_64' && 'MINGW64' || 'MINGW32' }}
          update: true
          install: mingw-w64-${{ matrix.arch }}-gcc make diffutils
      - name: Build winpthreads
        run: >-
          cd mingw-w64-libraries/winpthreads || exit;
          ./configure;
          make
      - name: Test winpthreads
        run: >-
          cd mingw-w64-libraries/winpthreads || exit;
          make check;
          mkdir -p outlib;
          cp libpthread.a outlib/libpthreadGC2-${{ matrix.arch == 'x86_64' && '64' || '32' }}.a;
          cp libpthread.dll.a outlib/libpthreadGC2-${{ matrix.arch == 'x86_64' && '64' || '32' }}.dll.a;
          cd tests_pthread || exit;
          make clean;
          make GC-static WTHR_TARGET_ARCH=${{ matrix.arch }} CROSS=${{ matrix.arch }}-w64-mingw32
