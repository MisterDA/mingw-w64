name: winpthreads
on: [push]

env:
  CYGWIN: winsymlinks:nativestrict

jobs:
  msvc:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        arch: ['x64', 'x86']

    steps:
      - name: Save pristine PATH
        run: |
          echo "PRISTINE_PATH=${env:Path}" >> "${env:GITHUB_ENV}"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          # This is cl version 19.38, Visual Studio version 17.8
          toolset: 14.38
          arch: ${{ matrix.arch }}

      - name: Restore Cygwin cache
        uses: actions/cache/restore@v3
        env:
          PATH: ${{ env.PRISTINE_PATH }}
        with:
          path: |
            C:\cygwin-packages
          key: cygwin-packages

      - name: Install Cygwin (Cygwin)
        uses: cygwin/cygwin-install-action@master
        with:
          packages: make

      - name: Save Cygwin cache
        uses: actions/cache/save@v3
        env:
          PATH: ${{ env.PRISTINE_PATH }}
        with:
          path: |
            C:\cygwin-packages
          key: cygwin-packages

      - uses: actions/checkout@v4
        with:
          path: mingw-w64
      - uses: actions/checkout@v4
        with:
          repository: metastack/msvs-tools
          path: msvs-tools

          # eval $(./msvs-tools/msvs-detect --arch=x64 "VS17.x;@");
          # export PATH=$MSVS_PATH:$PATH;
          # export INCLUDE=$MSVS_INC;$INCLUDE;
          # export LIB=$MSVS_LIB;$LIB;

      - name: Build winpthreads
        shell: bash -eo pipefail {0}
        env:
          HOST: ${{ matrix.arch == 'x64' && 'x86_64-pc-windows' || 'i686-pc-windows' }}
        run: >-
          eval $(./msvs-tools/msvs-promote-path);
          cd mingw-w64/mingw-w64-libraries/winpthreads || exit;
          ./configure --host=$HOST CC=cl.exe;
          make

  msys2-mingw64:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc make diffutils
      - name: Build winpthreads
        run: >-
          cd mingw-w64-libraries/winpthreads || exit;
          ./configure;
          make
      - name: Test winpthreads
        run: >-
          cd mingw-w64-libraries/winpthreads || exit;
          mkdir -p outlib;
          cp libpthread.a outlib/libpthreadGC2-64.a;
          cp libpthread.dll.a outlib/libpthreadGC2-64.dll.a;
          cd tests_pthread || exit;
          make clean;
          make GC-static WTHR_TARGET_ARCH=x86_64 CROSS=x86_64-w64-mingw32
